<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: {{WIDTH}}px; height: {{HEIGHT}}px;
  overflow: hidden; position: relative;
  background: {{GREEN}};
  font-family: 'Inter', sans-serif;
}
{{#if BG_SRC}}
.bg { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
.overlay { position: absolute; inset: 0; background: {{OVERLAY}}; z-index: 2; }
{{/if}}
.noise {
  position: absolute; inset: 0;
  background-image: radial-gradient(circle, rgba(255,255,255,0.018) 1px, transparent 1px);
  background-size: 1.6vw 1.6vw; z-index: 3;
}
.glow {
  position: absolute; bottom: -8vh; right: -4vw; width: 50vw; height: 55vh;
  background: {{GOLD}}; opacity: 0.07; border-radius: 50%;
  filter: blur(90px); z-index: 3;
}
{{#if WATERMARK}}
.watermark {
  position: absolute; bottom: -0.14em; right: -0.02em;
  font-size: {{WATERMARK_SIZE}}px; font-weight: 900;
  font-family: 'Inter', sans-serif;
  color: rgba(255,255,255,0.032); z-index: 4;
  letter-spacing: -0.03em; text-transform: uppercase;
  line-height: 1; white-space: nowrap;
}
{{/if}}
.content {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; justify-content: center;
  z-index: 5; padding: 9vh 8vw;
}
.subtext {
  font-family: 'Inter', sans-serif;
  font-size: calc({{WIDTH}}px * 0.013);
  font-weight: 600; letter-spacing: 0.18em;
  text-transform: uppercase; color: {{GOLD}};
  margin-bottom: 2.2vh;
}
.headline {
  font-family: 'Playfair Display', serif;
  font-size: {{HEADLINE_SIZE}}px;
  font-weight: 900; line-height: 1.08;
  color: #FFFFFF;
  white-space: pre-line;
}
.accent-bar {
  width: calc({{WIDTH}}px * 0.045); height: 3px;
  background: {{GOLD}}; margin-top: 3.5vh;
}
.logo-wrap {
  position: absolute; bottom: 6vh; right: 7vw; z-index: 6;
}
.logo-wrap img { height: calc({{HEIGHT}}px * 0.056); opacity: 0.92; }
</style>
</head>
<body>
{{#if BG_SRC}}<img class="bg" src="{{BG_SRC}}"><div class="overlay"></div>{{/if}}
<div class="noise"></div>
<div class="glow"></div>
{{#if WATERMARK}}<div class="watermark">{{WATERMARK}}</div>{{/if}}
<div class="content">
  {{#if SUBTEXT}}<div class="subtext">{{SUBTEXT}}</div>{{/if}}
  <div class="headline">{{HEADLINE}}</div>
  <div class="accent-bar"></div>
</div>
{{#if LOGO_SRC}}<div class="logo-wrap"><img src="{{LOGO_SRC}}"></div>{{/if}}
</body>
</html>
